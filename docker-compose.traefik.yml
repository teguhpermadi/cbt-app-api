version: '3.8'

# Jalankan SEKALI di VPS sebelum service lain:
#   docker compose -f docker-compose.traefik.yml up -d
#
# Pastikan network sudah dibuat terlebih dahulu:
#   docker network create app-network

services:
  traefik:
    image: traefik:v3.1
    container_name: traefik
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./docker/traefik/traefik.yml:/traefik.yml:ro
      - ./docker/traefik/acme.json:/acme.json
    networks:
      - app-network
    labels:
      - "traefik.enable=true"
      # Dashboard Traefik (opsional, bisa dihapus di production)
      - "traefik.http.routers.traefik-dashboard.rule=Host(`traefik.cbtmiarridlo.com`)"
      - "traefik.http.routers.traefik-dashboard.entrypoints=websecure"
      - "traefik.http.routers.traefik-dashboard.tls.certresolver=letsencrypt"
      - "traefik.http.routers.traefik-dashboard.service=api@internal"
      - "traefik.http.routers.traefik-dashboard.middlewares=dashboard-auth"
      # Basic auth untuk dashboard (generate: htpasswd -nb admin password)
      - "traefik.http.middlewares.dashboard-auth.basicauth.users=${TRAEFIK_DASHBOARD_AUTH}"
      # Middleware global HTTPS redirect
      - "traefik.http.middlewares.https-redirect.redirectscheme.scheme=https"
      - "traefik.http.middlewares.https-redirect.redirectscheme.permanent=true"

networks:
  app-network:
    external: true
