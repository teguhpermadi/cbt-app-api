server {
    listen 80;
    server_name api.cbtmiarridlo.com;

    root /var/www/public;
    index index.php index.html;

    # Security: hide Nginx version
    server_tokens off;

    # Logging
    error_log  /var/log/nginx/error.log warn;
    access_log /var/log/nginx/access.log;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/javascript text/xml application/json application/javascript application/xml application/xml+rss;

    # WebSocket — Reverb (/app path digunakan oleh Laravel Reverb)
    location /app {
        proxy_pass http://app:9000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }

    # Static files
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # PHP-FPM
    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_param REMOTE_ADDR $remote_addr;
        fastcgi_param HTTP_X_FORWARDED_PROTO $http_x_forwarded_proto;
        fastcgi_read_timeout 300;
    }

    # Storage symlink
    location /storage {
        alias /var/www/storage/app/public;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Block hidden files (.env, .git, etc.)
    location ~ /\.(?!well-known).* {
        deny all;
    }
}
