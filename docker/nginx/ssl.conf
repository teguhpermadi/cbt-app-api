# SSL Configuration for app.cbtmiarridlo.com
server {
    listen 443 ssl http2;
    server_name app.cbtmiarridlo.com;

    ssl_certificate /etc/letsencrypt/live/cbtmiarridlo.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cbtmiarridlo.com/privkey.pem;

    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;
    ssl_session_tickets off;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;

    ssl_trusted_certificate /etc/letsencrypt/live/cbtmiarridlo.com/chain.pem;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    location / {
        proxy_pass http://frontend:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_cache_bypass $http_upgrade;
    }

    gzip on;
    gzip_types text/plain text/css text/javascript text/xml application/json application/javascript application/xml+rss;
    gzip_comp_level 6;
}

# SSL Configuration for api.cbtmiarridlo.com
server {
    listen 443 ssl http2;
    server_name api.cbtmiarridlo.com;

    ssl_certificate /etc/letsencrypt/live/cbtmiarridlo.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cbtmiarridlo.com/privkey.pem;

    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;
    ssl_session_tickets off;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;

    ssl_trusted_certificate /etc/letsencrypt/live/cbtmiarridlo.com/chain.pem;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    root /var/www/public;

    index index.php index.html;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location /app {
        proxy_pass http://reverb:6001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }

    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass backend:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }

    location /storage {
        alias /var/www/storage/app/public;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    gzip on;
    gzip_types text/plain text/css text/javascript text/xml application/json application/javascript application/xml+rss;
    gzip_comp_level 6;
}

# HTTP to HTTPS redirect for app.cbtmiarridlo.com
server {
    listen 80;
    server_name app.cbtmiarridlo.com;
    return 301 https://$host$request_uri;
}

# HTTP to HTTPS redirect for api.cbtmiarridlo.com
server {
    listen 80;
    server_name api.cbtmiarridlo.com;
    return 301 https://$host$request_uri;
}