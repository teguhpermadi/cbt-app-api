
services:
  # ─────────────────────────────────────────
  # Nginx Sidecar — FastCGI bridge ke backend
  # ─────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: cbt-nginx
    expose:
      - "80"
    volumes:
      - ./docker/nginx/backend.conf:/etc/nginx/conf.d/default.conf:ro
      - storage:/var/www/storage
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - app-network
      - traefik-proxy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-proxy"
      - "traefik.http.routers.backend.rule=Host(`api.cbtmiarridlo.com`)"
      - "traefik.http.routers.backend.entrypoints=websecure"
      - "traefik.http.routers.backend.tls.certresolver=letsencrypt"
      - "traefik.http.services.backend.loadbalancer.server.port=80"
      - "traefik.http.routers.backend-http.rule=Host(`api.cbtmiarridlo.com`)"
      - "traefik.http.routers.backend-http.entrypoints=web"
      - "traefik.http.routers.backend-http.middlewares=https-redirect@docker"

  # ─────────────────────────────────────────
  # Backend Laravel (PHP-FPM)
  # ─────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cbt-backend
    working_dir: /var/www
    volumes:
      - storage:/var/www/storage
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    environment:
      - DB_HOST=mysql
      - REDIS_HOST=redis
      - DB_MONGO_HOST=mongodb
    networks:
      - app-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "php artisan --version || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # ─────────────────────────────────────────
  # Laravel Reverb (WebSocket)
  # ─────────────────────────────────────────
  reverb:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cbt-reverb
    working_dir: /var/www
    command: ["php", "artisan", "reverb:start", "--host=0.0.0.0", "--port=6001"]
    volumes:
      - storage:/var/www/storage
    depends_on:
      backend:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - REVERB_HOST=0.0.0.0
      - REVERB_PORT=6001
      - REVERB_SCHEME=https
      - DB_HOST=mysql
      - REDIS_HOST=redis
      - DB_MONGO_HOST=mongodb
    expose:
      - "6001"
    networks:
      - app-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "php artisan reverb:status || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # ─────────────────────────────────────────
  # Queue Worker
  # ─────────────────────────────────────────
  queue:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cbt-queue
    working_dir: /var/www
    command: ["php", "artisan", "queue:work", "--sleep=3", "--tries=3", "--max-time=3600"]
    volumes:
      - storage:/var/www/storage
    depends_on:
      backend:
        condition: service_healthy
      redis:
        condition: service_healthy
      mysql:
        condition: service_healthy
    environment:
      - DB_HOST=mysql
      - REDIS_HOST=redis
      - DB_MONGO_HOST=mongodb
    networks:
      - app-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'queue:work' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # ─────────────────────────────────────────
  # phpMyAdmin
  # ─────────────────────────────────────────
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: cbt-phpmyadmin
    expose:
      - "80"
    environment:
      - PMA_HOST=mysql
      - PMA_USER=root
      - PMA_PASSWORD=${DB_ROOT_PASSWORD}
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - app-network
      - traefik-proxy
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-proxy"
      - "traefik.http.routers.phpmyadmin.rule=Host(`phpmyadmin.cbtmiarridlo.com`)"
      - "traefik.http.routers.phpmyadmin.entrypoints=websecure"
      - "traefik.http.routers.phpmyadmin.tls.certresolver=letsencrypt"
      - "traefik.http.services.phpmyadmin.loadbalancer.server.port=80"
      - "traefik.http.routers.phpmyadmin-http.rule=Host(`phpmyadmin.cbtmiarridlo.com`)"
      - "traefik.http.routers.phpmyadmin-http.entrypoints=web"
      - "traefik.http.routers.phpmyadmin-http.middlewares=https-redirect@docker"

  # ─────────────────────────────────────────
  # Database - MySQL
  # ─────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: cbt-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_DATABASE:-cbt_app}
      # DB_APP_USERNAME harus bukan 'root' — MySQL menolak MYSQL_USER=root
      MYSQL_USER: ${DB_APP_USERNAME:-cbt_user}
      MYSQL_PASSWORD: ${DB_APP_PASSWORD}
    volumes:
      - mysql-data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d:ro
    networks:
      - app-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────
  # Cache - Redis
  # ─────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: cbt-redis
    volumes:
      - redis-data:/data
    networks:
      - app-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────
  # NoSQL - MongoDB
  # ─────────────────────────────────────────
  mongodb:
    image: mongo:7.0
    container_name: cbt-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USERNAME:-mongo_user}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
      MONGO_INITDB_DATABASE: ${DB_MONGO_DATABASE:-cbt_app}
    volumes:
      - mongodb-data:/data/db
    networks:
      - app-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mysql-data:
  redis-data:
  mongodb-data:
  storage:

networks:
  app-network:
  traefik-proxy:
    external: true