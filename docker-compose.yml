
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cbt-app
    working_dir: /var/www
    volumes:
      - ./:/var/www
      - ./storage:/var/www/storage
    depends_on:
      - mysql
      - redis
      - mongodb
    environment:
      - DB_HOST=mysql
      - REDIS_HOST=redis
      - DB_MONGO_HOST=mongodb
    networks:
      - cbt-network
    command: ["php-fpm"]

  nginx:
    image: nginx:alpine
    container_name: cbt-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./docker/nginx/ssl.conf:/etc/nginx/conf.d/ssl.conf
      - ./docker/ssl:/etc/letsencrypt/live
      - ./storage:/var/www/storage
    depends_on:
      - app
    networks:
      - cbt-network

  mysql:
    image: mysql:8.0
    container_name: cbt-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-secure_password}
      MYSQL_DATABASE: ${DB_DATABASE:-cbt_app}
      MYSQL_USER: ${DB_USERNAME:-cbt_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-user_password}
    volumes:
      - ./docker/mysql:/var/lib/mysql
    networks:
      - cbt-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: cbt-redis
    volumes:
      - ./docker/redis:/data
    networks:
      - cbt-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongodb:
    image: mongo:7.0
    container_name: cbt-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USERNAME:-mongo_user}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-mongo_password}
      MONGO_INITDB_DATABASE: ${DB_MONGO_DATABASE:-cbt_app}
    volumes:
      - ./docker/mongodb:/data/db
    networks:
      - cbt-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  cbt-network:
    driver: bridge