services:


  nginx:
    build:
      context: .
      dockerfile: docker/nginx/Dockerfile
    container_name: cbt-nginx
    volumes:
      - storage:/var/www/storage
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - app-network
      - traefik-proxy
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-proxy"
      - "traefik.http.routers.api.rule=Host(`api.cbtmiarridlo.com`)"
      - "traefik.http.routers.api.entrypoints=websecure"
      - "traefik.http.routers.api.tls.certresolver=letsencrypt"
      - "traefik.http.services.api.loadbalancer.server.port=80"
      - "traefik.http.routers.api-http.rule=Host(`api.cbtmiarridlo.com`)"
      - "traefik.http.routers.api-http.entrypoints=web"
      - "traefik.http.routers.api-http.middlewares=https-redirect@docker"
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cbt-backend
    working_dir: /var/www
    volumes:
      - storage:/var/www/storage
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env.production
    networks:
      - app-network
      - traefik-proxy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "php artisan --version || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    extra_hosts:
      - "host.docker.internal:host-gateway"

  reverb:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cbt-reverb
    working_dir: /var/www
    command: ["php", "artisan", "reverb:start", "--host=0.0.0.0", "--port=6001"]
    volumes:
      - storage:/var/www/storage
    depends_on:
      backend:
        condition: service_healthy
      redis:
        condition: service_healthy
      mysql:
        condition: service_healthy
    env_file:
      - .env.production
    expose:
      - "6001"
    networks:
      - app-network
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"

  queue:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cbt-queue
    working_dir: /var/www
    command: ["php", "artisan", "queue:work", "--sleep=3", "--tries=3", "--max-time=3600"]
    volumes:
      - storage:/var/www/storage
    depends_on:
      backend:
        condition: service_healthy
      redis:
        condition: service_healthy
      mysql:
        condition: service_healthy
    env_file:
      - .env.production
    networks:
      - app-network
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: cbt-phpmyadmin
    expose:
      - "80"
    environment:
      - PMA_HOST=mysql
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - app-network
      - traefik-proxy
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-proxy"
      - "traefik.http.routers.phpmyadmin.rule=Host(`phpmyadmin.cbtmiarridlo.com`)"
      - "traefik.http.routers.phpmyadmin.entrypoints=websecure"
      - "traefik.http.routers.phpmyadmin.tls.certresolver=letsencrypt"
      - "traefik.http.services.phpmyadmin.loadbalancer.server.port=80"
      - "traefik.http.routers.phpmyadmin-http.rule=Host(`phpmyadmin.cbtmiarridlo.com`)"
      - "traefik.http.routers.phpmyadmin-http.entrypoints=web"
      - "traefik.http.routers.phpmyadmin-http.middlewares=https-redirect@docker"

  mysql:
    image: mysql:8.0
    container_name: cbt-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-MySQL_R00t_P@ss2026}
      MYSQL_DATABASE: ${DB_DATABASE:-cbt_app}
      MYSQL_USER: ${DB_APP_USERNAME:-user_cbt}
      MYSQL_PASSWORD: ${DB_APP_PASSWORD:-miarridlo}
    volumes:
      - mysql-data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d:ro
    networks:
      - app-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s

  redis:
    image: redis:7-alpine
    container_name: cbt-redis
    env_file:
      - .env.production
    command: ["/bin/sh", "-c", "exec redis-server --requirepass \"$$REDIS_PASSWORD\""]
    volumes:
      - redis-data:/data
    networks:
      - app-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mysql-data:
  redis-data:
  storage:

networks:
  app-network:
  traefik-proxy:
    external: true