
services:
  # ─────────────────────────────────────────
  # Frontend React (Nginx static serving)
  # ─────────────────────────────────────────
  frontend:
    build:
      context: ../lunar-pinwheel
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=https://api.cbtmiarridlo.com/api/v1
        - VITE_REVERB_APP_KEY=pusbcdgudcsfkepuso8p
        - VITE_REVERB_HOST=api.cbtmiarridlo.com
        - VITE_REVERB_PORT=443
        - VITE_REVERB_SCHEME=wss
    container_name: lunar-frontend
    expose:
      - "8080"
    restart: unless-stopped
    networks:
      - app-network
    labels:
      - "traefik.enable=true"
      # HTTPS — root domain + www
      - "traefik.http.routers.frontend.rule=Host(`cbtmiarridlo.com`) || Host(`www.cbtmiarridlo.com`)"
      - "traefik.http.routers.frontend.entrypoints=websecure"
      - "traefik.http.routers.frontend.tls.certresolver=letsencrypt"
      - "traefik.http.services.frontend.loadbalancer.server.port=8080"
      # HTTP → HTTPS redirect
      - "traefik.http.routers.frontend-http.rule=Host(`cbtmiarridlo.com`) || Host(`www.cbtmiarridlo.com`)"
      - "traefik.http.routers.frontend-http.entrypoints=web"
      - "traefik.http.routers.frontend-http.middlewares=https-redirect@docker"

  # ─────────────────────────────────────────
  # Nginx Sidecar — FastCGI bridge ke backend
  # ─────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: cbt-nginx
    expose:
      - "80"
    volumes:
      - ./docker/nginx/backend.conf:/etc/nginx/conf.d/default.conf:ro
      - storage:/var/www/storage
    depends_on:
      - backend
      - reverb
    restart: unless-stopped
    networks:
      - app-network
    extra_hosts:
      - "host.docker.internal:host-gateway"
    labels:
      - "traefik.enable=true"
      # HTTPS untuk API
      - "traefik.http.routers.backend.rule=Host(`api.cbtmiarridlo.com`)"
      - "traefik.http.routers.backend.entrypoints=websecure"
      - "traefik.http.routers.backend.tls.certresolver=letsencrypt"
      - "traefik.http.services.backend.loadbalancer.server.port=80"
      # HTTP → HTTPS redirect
      - "traefik.http.routers.backend-http.rule=Host(`api.cbtmiarridlo.com`)"
      - "traefik.http.routers.backend-http.entrypoints=web"
      - "traefik.http.routers.backend-http.middlewares=https-redirect@docker"

  # ─────────────────────────────────────────
  # Backend Laravel (PHP-FPM)
  # ─────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cbt-backend
    working_dir: /var/www
    volumes:
      - storage:/var/www/storage
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env.production
    networks:
      - app-network
    command: ["php-fpm"]
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # ─────────────────────────────────────────
  # Laravel Reverb (WebSocket)
  # ─────────────────────────────────────────
  reverb:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cbt-reverb
    working_dir: /var/www
    command: ["php", "artisan", "reverb:start", "--host=0.0.0.0", "--port=6001"]
    volumes:
      - storage:/var/www/storage
    depends_on:
      - backend
    env_file:
      - .env.production
    expose:
      - "6001"
    networks:
      - app-network
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # ─────────────────────────────────────────
  # Queue Worker
  # ─────────────────────────────────────────
  queue:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cbt-queue
    working_dir: /var/www
    command: ["php", "artisan", "queue:work", "--sleep=3", "--tries=3", "--max-time=3600"]
    volumes:
      - storage:/var/www/storage
    depends_on:
      - backend
      - redis
    env_file:
      - .env.production
    networks:
      - app-network
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # ─────────────────────────────────────────
  # Database - MySQL
  # ─────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: cbt-mysql
    env_file:
      - .env.production
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_DATABASE:-cbt_app}
      MYSQL_USER: ${DB_APP_USERNAME:-cbt_user}
      MYSQL_PASSWORD: ${DB_APP_PASSWORD}
    volumes:
      - ./docker/mysql:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d:ro
    networks:
      - app-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p$MYSQL_ROOT_PASSWORD || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 120s

  # ─────────────────────────────────────────
  # Cache - Redis
  # ─────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: cbt-redis
    command: redis-server --requirepass ${REDIS_PASSWORD}
    env_file:
      - .env.production
    volumes:
      - ./docker/redis:/data
    networks:
      - app-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $REDIS_PASSWORD ping || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  app-network:

volumes:
  storage: