version: '3.8'

services:
  # ─────────────────────────────────────────
  # Traefik Reverse Proxy + Auto SSL (ACME)
  # ─────────────────────────────────────────
  traefik:
    image: traefik:v3.0
    container_name: traefik
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./docker/traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./docker/traefik/acme.json:/acme.json
    networks:
      - app-network
    labels:
      - "traefik.enable=true"
      # Dashboard (opsional, akses via https://traefik.cbtmiarridlo.com)
      - "traefik.http.routers.traefik-dashboard.rule=Host(`traefik.cbtmiarridlo.com`)"
      - "traefik.http.routers.traefik-dashboard.service=api@internal"
      - "traefik.http.routers.traefik-dashboard.tls.certresolver=letsencrypt"
      - "traefik.http.routers.traefik-dashboard.middlewares=auth"
      # Basic auth untuk dashboard (ganti passwordnya!)
      # Generate: echo $(htpasswd -nb admin yourpassword) | sed -e s/\\$/\\$\\$/g
      - "traefik.http.middlewares.auth.basicauth.users=admin:$$apr1$$xyz$$hashedpasshere"
      # Middleware redirect HTTP → HTTPS
      - "traefik.http.middlewares.https-redirect.redirectscheme.scheme=https"
      - "traefik.http.middlewares.https-redirect.redirectscheme.permanent=true"

  # ─────────────────────────────────────────
  # Frontend React (Nginx static serving)
  # ─────────────────────────────────────────
  frontend:
    build:
      context: ../lunar-pinwheel
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=https://api.cbtmiarridlo.com/api/v1
        - VITE_REVERB_APP_KEY=pusbcdgudcsfkepuso8p
        - VITE_REVERB_HOST=api.cbtmiarridlo.com
        - VITE_REVERB_PORT=443
        - VITE_REVERB_SCHEME=wss
    container_name: lunar-frontend
    expose:
      - "8080"
    restart: unless-stopped
    networks:
      - app-network
    labels:
      - "traefik.enable=true"
      # HTTPS router
      - "traefik.http.routers.frontend.rule=Host(`app.cbtmiarridlo.com`)"
      - "traefik.http.routers.frontend.entrypoints=websecure"
      - "traefik.http.routers.frontend.tls.certresolver=letsencrypt"
      - "traefik.http.services.frontend.loadbalancer.server.port=8080"
      # HTTP → HTTPS redirect
      - "traefik.http.routers.frontend-http.rule=Host(`app.cbtmiarridlo.com`)"
      - "traefik.http.routers.frontend-http.entrypoints=web"
      - "traefik.http.routers.frontend-http.middlewares=https-redirect"

  # ─────────────────────────────────────────
  # Nginx Sidecar — FastCGI bridge ke backend
  # ─────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: cbt-nginx
    expose:
      - "80"
    volumes:
      - ./:/var/www:ro
      - ./docker/nginx/backend.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - reverb
    networks:
      - app-network
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    labels:
      - "traefik.enable=true"
      # HTTPS router untuk API
      - "traefik.http.routers.backend.rule=Host(`api.cbtmiarridlo.com`)"
      - "traefik.http.routers.backend.entrypoints=websecure"
      - "traefik.http.routers.backend.tls.certresolver=letsencrypt"
      - "traefik.http.services.backend.loadbalancer.server.port=80"
      # HTTP → HTTPS redirect
      - "traefik.http.routers.backend-http.rule=Host(`api.cbtmiarridlo.com`)"
      - "traefik.http.routers.backend-http.entrypoints=web"
      - "traefik.http.routers.backend-http.middlewares=https-redirect"

  # ─────────────────────────────────────────
  # Backend Laravel (PHP-FPM)
  # ─────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cbt-backend
    working_dir: /var/www
    volumes:
      - ./:/var/www
      - ./storage:/var/www/storage
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    environment:
      - DB_HOST=mysql
      - REDIS_HOST=redis
      - DB_MONGO_HOST=mongodb
    networks:
      - app-network
    command: ["php-fpm"]
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # ─────────────────────────────────────────
  # Laravel Reverb (WebSocket)
  # ─────────────────────────────────────────
  reverb:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cbt-reverb
    working_dir: /var/www
    command: ["php", "artisan", "reverb:start", "--host=0.0.0.0", "--port=6001"]
    volumes:
      - ./:/var/www
    depends_on:
      - backend
    environment:
      - REVERB_HOST=0.0.0.0
      - REVERB_PORT=6001
      - REVERB_SCHEME=https
      - DB_HOST=mysql
      - REDIS_HOST=redis
      - DB_MONGO_HOST=mongodb
    expose:
      - "6001"
    networks:
      - app-network
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # ─────────────────────────────────────────
  # Queue Worker
  # ─────────────────────────────────────────
  queue:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cbt-queue
    working_dir: /var/www
    command: ["php", "artisan", "queue:work", "--sleep=3", "--tries=3", "--max-time=3600"]
    volumes:
      - ./:/var/www
    depends_on:
      - backend
      - redis
    environment:
      - DB_HOST=mysql
      - REDIS_HOST=redis
      - DB_MONGO_HOST=mongodb
    networks:
      - app-network
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # ─────────────────────────────────────────
  # Database - MySQL
  # ─────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: cbt-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-secure_password}
      MYSQL_DATABASE: ${DB_DATABASE:-cbt_app}
      MYSQL_USER: ${DB_USERNAME:-cbt_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-user_password}
    volumes:
      - ./docker/mysql:/var/lib/mysql
    networks:
      - app-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────
  # Cache - Redis
  # ─────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: cbt-redis
    volumes:
      - ./docker/redis:/data
    networks:
      - app-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────
  # NoSQL - MongoDB
  # ─────────────────────────────────────────
  mongodb:
    image: mongo:7.0
    container_name: cbt-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USERNAME:-mongo_user}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-mongo_password}
      MONGO_INITDB_DATABASE: ${DB_MONGO_DATABASE:-cbt_app}
    volumes:
      - ./docker/mongodb:/data/db
    networks:
      - app-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  app-network:
    driver: bridge